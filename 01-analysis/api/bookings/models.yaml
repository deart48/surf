# Бронь и её представления.
# Ссылки: '#/components/schemas/...' — внутри файла;
# '../slots/...' и '../common/...' — на соседние домены.

components:
  schemas:
    BookingStatus:
      type: string
      description: >-
        Статус брони (data-model → Booking). active — активна; cancelled —
        ранняя отмена (≥24 ч до старта): место и прокатный комплект освобождаются
        (FR-16). late_cancel — поздняя отмена (<24 ч до старта): место и комплект
        НЕ освобождаются, штрафов нет (FR-17). studio_cancelled — «Отменён
        студией»: слот снят студией (Slot.status = cancelled), бронь отменена не
        по инициативе клиента, повторная запись на слот запрещена (R-008, FR-18).
      enum:
        - active
        - cancelled
        - late_cancel
        - studio_cancelled

    CreateBookingRequest:
      type: object
      description: >-
        Запрос на создание брони (UC-2, FR-6…FR-12). По гостям передаётся только
        число мест и число прокатных комплектов; имена/контакты гостей не
        собираются (FR-8).
      required:
        - slot_id
        - seats_count
        - rental_count
      properties:
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота.
        seats_count:
          type: integer
          description: Число мест (себя + до 5 гостей, в пределах одного стола).
          minimum: 1
          maximum: 6
          example: 3
        rental_count:
          type: integer
          description: Число прокатных комплектов (фартук + набор ножей). Не больше seats_count.
          minimum: 0
          maximum: 6
          example: 2
        allergies:
          type: string
          nullable: true
          description: >-
            Аллергии — одно опциональное поле на всю бронь, передаётся шефу (FR-12).
            Пустое значение/отсутствие допустимо.
          maxLength: 500
          example: Орехи, лактоза

    Booking:
      type: object
      description: >-
        Полные данные брони для экрана деталей (SCR-09). Тарифы (price за место,
        rental_price за прокатный комплект) и валюта лежат в booking.slot, а не
        на верхнем уровне брони (FR-13); на уровне брони присутствует только
        производное итоговое поле price_total.
      required:
        - id
        - slot_id
        - client_id
        - seats_count
        - rental_count
        - status
        - price_total
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор брони.
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота, на который оформлена бронь.
        client_id:
          type: string
          format: uuid
          description: Идентификатор клиента, оформившего бронь (владелец брони, NFR-8).
        seats_count:
          type: integer
          description: Число забронированных мест (1..6).
          minimum: 1
          maximum: 6
          example: 3
        rental_count:
          type: integer
          description: Число прокатных комплектов (0..seats_count).
          minimum: 0
          maximum: 6
          example: 2
        allergies:
          type: string
          nullable: true
          description: Аллергии, указанные при записи (одно поле на всю бронь, FR-12).
          example: Орехи, лактоза
        status:
          $ref: '#/components/schemas/BookingStatus'
        price_total:
          type: integer
          description: >-
            Производное поле только для чтения, в рублях (валюта RUB) =
            slot.price·seats_count + slot.rental_price·rental_count (FR-13). Сами
            тарифы price/rental_price берутся из booking.slot; оплата офлайн.
          readOnly: true
          example: 11500
        created_at:
          type: string
          format: date-time
          description: Дата и время создания брони.
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отмены, если бронь была отменена.
        cancel_reason:
          type: string
          nullable: true
          readOnly: true
          description: >-
            Причина отмены. Заполняется при studio_cancelled (текст причины от
            студии, например «срыв поставки продуктов»); для cancelled/late_cancel
            и active — null (R-008, FR-18).
          example: Срыв поставки продуктов
        slot:
          $ref: '../slots/models.yaml#/components/schemas/Slot'

    CreateBookingResponse:
      type: object
      description: >-
        Ответ на создание брони (SCR-07). Полные данные брони (как Booking) плюс
        признак первой брони клиента и параметры напоминания для конфигурации
        push-уведомления (FR-19).
      allOf:
        - $ref: '#/components/schemas/Booking'
        - type: object
          required:
            - is_first_booking
          properties:
            is_first_booking:
              type: boolean
              description: >-
                true, если это первая успешная бронь клиента (для приветственного
                сценария/онбординга на клиенте, SCR-07).
              example: true
            reminder_hours:
              type: array
              description: >-
                За сколько часов до старта класса клиенту будут отправлены
                push-напоминания (FR-19). Используется клиентом для информирования
                пользователя; пусто/отсутствует — напоминания не настроены.
                Канонический MVP-набор — `[24]` (за 24 ч до старта); значение
                задаётся сервером, клиент его не хардкодит.
              items:
                type: integer
              example: [24]

    BookingSummary:
      type: object
      description: Урезанное представление брони для списка «Мои бронирования» (SCR-08).
      required:
        - id
        - slot_id
        - seats_count
        - rental_count
        - status
        - price_total
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор брони.
        slot_id:
          type: string
          format: uuid
          description: Идентификатор слота, на который оформлена бронь.
        seats_count:
          type: integer
          description: Число забронированных мест (1..6).
          minimum: 1
          maximum: 6
          example: 3
        rental_count:
          type: integer
          description: Число прокатных комплектов (0..seats_count).
          minimum: 0
          maximum: 6
          example: 2
        status:
          $ref: '#/components/schemas/BookingStatus'
        price_total:
          type: integer
          description: >-
            Производное поле только для чтения, в рублях (валюта RUB) =
            slot.price·seats_count + slot.rental_price·rental_count (FR-13). Сами
            тарифы price/rental_price берутся из booking.slot.
          readOnly: true
          example: 11500
        created_at:
          type: string
          format: date-time
          description: Дата и время создания брони.
        cancelled_at:
          type: string
          format: date-time
          nullable: true
          description: Дата и время отмены, если бронь была отменена.
        cancel_reason:
          type: string
          nullable: true
          readOnly: true
          description: >-
            Причина отмены. Заполняется при studio_cancelled (текст причины от
            студии); для cancelled/late_cancel и active — null (R-008, FR-18).
          example: Срыв поставки продуктов
        slot:
          $ref: '../slots/models.yaml#/components/schemas/SlotSummary'

    BookingListResponse:
      type: object
      description: Постраничный список броней (SCR-08).
      required:
        - items
        - meta
      properties:
        items:
          type: array
          description: Элементы списка броней.
          items:
            $ref: '#/components/schemas/BookingSummary'
        meta:
          $ref: '../common/models.yaml#/components/schemas/PaginationMeta'
