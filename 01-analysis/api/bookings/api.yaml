openapi: 3.0.3

info:
  title: Шеф-стол API — Bookings
  description: >-
    Бронирования клиента: создание, список, детали и отмена. Часть клиентского
    API кулинарной студии «Шеф-стол».
  version: 1.0.0

servers:
  - url: https://api.chef-table.example/v1
    description: Production — продакшен-окружение
  - url: https://staging-api.chef-table.example/v1
    description: Staging — тестовое окружение

tags:
  - name: Bookings
    description: Бронирования

security:
  - bearerAuth: []

paths:
  /bookings:
    post:
      tags:
        - Bookings
      summary: Создать бронь
      operationId: createBooking
      description: >-
        Запись на класс (SCR-06, UC-2, FR-6…FR-13). seats_count 1..6 (себя + до 5
        гостей, в пределах одного стола), rental_count 0..seats_count. По гостям
        собираются только число мест и выбор экипировки; имена/контакты гостей не
        передаются (FR-8). Аллергии — одно опциональное поле на всю бронь (FR-12).
        Итоговая цена (price_total) производна от тарифов слота:
        slot.price·seats_count + slot.rental_price·rental_count (FR-13). Операция
        атомарна: учёт мест и прокатного фонда раздельный, овербукинг и двойная
        бронь исключены (NFR-4, R-004).


        Семантика ответов (createBooking-sequence): 201 — бронь создана; 409 —
        не хватает мест (slot_full, E1/E3) или прокатных комплектов на стол
        (rental_unavailable, E2), либо гонка запросов (E3); 410 — слот отменён
        студией (slot_cancelled, E4), повторная запись запрещена (R-008).


        Идемпотентность (R-004): заголовок Idempotency-Key обязателен. Повтор
        запроса с тем же ключом и тем же телом возвращает идентичный ответ ранее
        созданной брони (тот же 201), а не создаёт дубль (защита от повтора после
        сетевого сбоя). Повтор того же ключа с другим телом → 409
        (idempotency_key_conflict). Ключ хранится не менее 24 ч.
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            format: uuid
          description: >-
            Обязательный ключ идемпотентности (UUID) для безопасного повтора при
            сетевом сбое (R-004). Хранится ≥24 ч; повтор с тем же ключом и телом →
            тот же ответ, с другим телом → 409.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './models.yaml#/components/schemas/CreateBookingRequest'
      responses:
        '201':
          description: Бронь создана
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/CreateBookingResponse'
        '400':
          $ref: '../common/models.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        '409':
          $ref: '../common/models.yaml#/components/responses/Conflict'
        '410':
          $ref: '../common/models.yaml#/components/responses/Gone'
        '422':
          $ref: '../common/models.yaml#/components/responses/UnprocessableEntity'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'
    get:
      tags:
        - Bookings
      summary: Мои брони
      operationId: listBookings
      description: >-
        Список броней текущего клиента (SCR-08, FR-14). Пагинация limit/offset.
        Сортировка по slot.start_at по убыванию. Фильтр по статусу (status)
        опционален и принимает несколько значений (OR): без фильтра возвращаются
        брони всех статусов, включая отменённые (cancelled), поздние отмены
        (late_cancel) и отменённые студией (studio_cancelled) — они остаются
        видимы в истории (FR-14, FR-18). Группировка предстоящие/прошедшие — на
        клиенте по slot.start_at.
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/BookingStatusParam'
        - $ref: '../common/models.yaml#/components/parameters/LimitParam'
        - $ref: '../common/models.yaml#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Список броней клиента
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/BookingListResponse'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

  /bookings/{bookingId}:
    get:
      tags:
        - Bookings
      summary: Детали брони
      operationId: getBooking
      description: >-
        Полные данные брони с вложенными данными слота/программы/шефа для карточки
        (SCR-09). Доступ только к своей брони (NFR-8): чужая бронь → 403.
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/BookingIdParam'
      responses:
        '200':
          description: Детали брони
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Booking'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../common/models.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../common/models.yaml#/components/responses/NotFound'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

  /bookings/{bookingId}/cancel:
    post:
      tags:
        - Bookings
      summary: Отменить бронь
      operationId: cancelBooking
      description: >-
        Отмена всей брони целиком (SCR-09, UC-3, FR-15…FR-17). Частичная отмена
        отдельного места/гостя не поддерживается. Сервер определяет тип по времени
        до старта: ≥24 ч → cancelled (места и прокатные комплекты возвращаются в
        слот/фонд, FR-16); <24 ч → late_cancel (не возвращаются, штрафов нет,
        FR-17). Граница ровно 24 ч трактуется как ранняя. Отмена недоступна после
        старта слота (UC-3 E1 → 422); повторная отмена не выполняется (UC-3 E2 → 409).
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/BookingIdParam'
      responses:
        '200':
          description: Бронь отменена; поле status = cancelled или late_cancel, заполнено cancelled_at
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Booking'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        '403':
          $ref: '../common/models.yaml#/components/responses/Forbidden'
        '404':
          $ref: '../common/models.yaml#/components/responses/NotFound'
        '409':
          $ref: '../common/models.yaml#/components/responses/Conflict'
        '422':
          $ref: '../common/models.yaml#/components/responses/UnprocessableEntity'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      $ref: '../auth/models.yaml#/components/securitySchemes/bearerAuth'
