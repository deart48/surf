# Клиент и запрос на обновление профиля.
# Ссылки внутри файла: '#/components/schemas/...'.

components:
  schemas:
    Client:
      type: object
      description: >-
        Клиент студии (data-model → Client). Аутентифицируется по номеру телефона
        (логин в формате E.164). Сразу после регистрации (verify-code, is_new=true)
        name ещё не задан — пустое/отсутствующее имя означает незавершённую
        регистрацию (дозаполняется через PATCH /profile, FR-1).
      required:
        - id
        - phone
        - created_at
      properties:
        id:
          type: string
          format: uuid
          description: Идентификатор клиента.
        name:
          type: string
          description: Имя клиента. Отсутствует у только что зарегистрированного клиента до дозаполнения (PATCH /profile).
          minLength: 1
          maxLength: 100
          example: Иван
        phone:
          type: string
          description: >-
            Номер телефона в формате E.164. Используется как логин. Возвращается
            владельцу в GET /profile; ПДн клиента защищены и не раскрываются
            третьим лицам (NFR-7, NFR-8).
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+79991234567'
        created_at:
          type: string
          format: date-time
          description: Дата и время регистрации клиента.

    UpdateProfileRequest:
      type: object
      description: Запрос на задание/обновление имени клиента (FR-1).
      required:
        - name
      properties:
        name:
          type: string
          description: Имя клиента.
          minLength: 1
          maxLength: 100
          example: Иван
