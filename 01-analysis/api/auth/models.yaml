# Аутентификация: схема безопасности и DTO потока OTP (вход, регистрация).
# Ссылки: '#/components/...' — внутри файла; '../profile/models.yaml#/...' — на клиента.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT access-токен, выдаётся после POST /auth/verify-code и обновляется через POST /auth/refresh. Передаётся в заголовке Authorization: Bearer <access_token>.'

  schemas:
    RequestCodeRequest:
      type: object
      description: Запрос на отправку OTP-кода на номер телефона (FR-2).
      required:
        - phone
      properties:
        phone:
          type: string
          description: Номер телефона в формате E.164.
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+79991234567'

    RequestCodeResponse:
      type: object
      description: Ответ на запрос OTP-кода. В демонстрационной backend-реализации code возвращается в ответе вместо отправки через SMS-провайдера.
      required:
        - ttl_seconds
        - resend_after_seconds
      properties:
        ttl_seconds:
          type: integer
          description: Срок жизни кода в секундах (по умолчанию 300 = 5 минут). По истечении код недействителен.
          example: 300
        resend_after_seconds:
          type: integer
          description: Через сколько секунд можно запросить повторную отправку (по умолчанию 60). Более ранний повтор → 429.
          example: 60
        code:
          type: string
          description: OTP-код для демонстрационной реализации без SMS-провайдера. В production должен отправляться через провайдера и не возвращаться клиенту.
          pattern: '^\d{4,6}$'
          example: '123456'

    TokenPair:
      type: object
      description: >-
        Пара JWT-токенов сессии. access_token передаётся в Authorization для
        защищённых запросов; refresh_token используется только на /auth/refresh
        для получения новой пары (ротация).
      required:
        - access_token
        - refresh_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: JWT access-токен. Короткоживущий, передаётся в заголовке Authorization.
        refresh_token:
          type: string
          description: Refresh-токен для обновления сессии через POST /auth/refresh. Долгоживущий, хранится только на клиенте.
        token_type:
          type: string
          description: Тип токена.
          enum:
            - Bearer
          example: Bearer
        expires_in:
          type: integer
          description: Срок жизни access-токена в секундах.
          example: 900

    RefreshTokenRequest:
      type: object
      description: Запрос на обновление сессии по refresh-токену.
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string
          description: Действительный refresh-токен, ранее выданный verify-code или refresh.

    PushTokenRequest:
      type: object
      description: Регистрация push-токена для напоминаний за 24 ч до класса (FR-19, NFR-9).
      required:
        - token
        - platform
      properties:
        token:
          type: string
          description: Токен push-уведомлений, выданный платформой (Web Push/FCM/APNs).
        platform:
          type: string
          description: Платформа клиента. Основной таргет — web (NFR-1).
          enum:
            - web
            - ios
            - android
          example: web

    PushTokenDeleteRequest:
      type: object
      description: >-
        Снятие регистрации push-токена (FR-19). Токен передаётся в теле,
        а не в URL, чтобы не записывать сырое значение токена в логи/историю URL.
      required:
        - token
        - platform
      properties:
        token:
          type: string
          description: Токен push-уведомлений, выданный платформой (Web Push/FCM/APNs).
        platform:
          type: string
          description: Платформа клиента.
          enum:
            - web
            - ios
            - android
          example: web

    VerifyCodeRequest:
      type: object
      description: >-
        Подтверждение OTP-кода и вход/регистрация (UC-5, SCR-02). Только phone и
        code: на этом шаге ещё не известно, новый клиент или существующий, поэтому
        имя здесь не передаётся — для нового клиента оно дозаполняется отдельным
        шагом (PATCH /profile, FR-1).
      required:
        - phone
        - code
      properties:
        phone:
          type: string
          description: Номер телефона в формате E.164.
          pattern: '^\+[1-9]\d{1,14}$'
          example: '+79991234567'
        code:
          type: string
          description: OTP-код из SMS (4–6 цифр).
          pattern: '^\d{4,6}$'
          example: '1234'

    VerifyCodeResponse:
      type: object
      description: >-
        Ответ на подтверждение кода — пара токенов сессии и данные клиента (UC-5).
        Для нового клиента (is_new=true) поле client.name пустое/отсутствует: имя
        дозаполняется через PATCH /profile (FR-1). Существующий клиент возвращается
        с заполненным именем.
      required:
        - tokens
        - client
        - is_new
      properties:
        tokens:
          $ref: '#/components/schemas/TokenPair'
        client:
          $ref: '../profile/models.yaml#/components/schemas/Client'
        is_new:
          type: boolean
          description: true, если клиент только что зарегистрирован (имя ещё не задано).
