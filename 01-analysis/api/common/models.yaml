# Сквозные объекты: общая схема ошибки, метаданные пагинации, переиспользуемые
# параметры запроса и типовые ответы-ошибки.
# Ссылки внутри файла: '#/components/<секция>/<Имя>'.

components:
  schemas:
    Error:
      type: object
      description: Стандартное тело ошибки.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: >-
            Канонический машинный код ошибки. Доменные коды: slot_full
            (нет свободных мест), rental_unavailable (не хватает прокатных
            комплектов на стол), double_booking (повторная бронь того же слота),
            slot_cancelled (слот отменён студией), slot_started (слот уже
            стартовал), already_cancelled (бронь уже отменена), invalid_code
            (неверный/истёкший OTP). Идемпотентность:
            idempotency_key_conflict (повтор ключа с другим телом).
            Транспортные/общие: bad_request (400), unauthorized (401),
            forbidden (403), not_found (404), too_many_requests (429),
            internal_error (5xx).
          enum:
            - slot_full
            - rental_unavailable
            - double_booking
            - slot_cancelled
            - slot_started
            - already_cancelled
            - invalid_code
            - idempotency_key_conflict
            - bad_request
            - unauthorized
            - forbidden
            - not_found
            - too_many_requests
            - internal_error
          example: slot_full
        message:
          type: string
          description: Человекочитаемое сообщение об ошибке.
          example: Свободных мест больше нет.
        details:
          type: object
          description: >-
            Необязательные машиночитаемые детали для динамических сообщений на клиенте
            (SCR-06 §6, E1/E2): например, актуальная доступность, чтобы показать
            «Свободно: N мест» / «Прокатных комплектов свободно: M» без разбора текста message.
          properties:
            available_seats:
              type: integer
              description: Сколько мест реально свободно на момент ошибки (для slot_full / превышения мест, E1/E3).
              example: 2
            available_rental_sets:
              type: integer
              description: Сколько прокатных комплектов реально свободно на стол (для rental_unavailable, E2).
              example: 1

    PaginationMeta:
      type: object
      description: Метаданные постраничной выдачи.
      required:
        - limit
        - offset
        - total
      properties:
        limit:
          type: integer
          description: Размер страницы.
          example: 20
        offset:
          type: integer
          description: Смещение от начала выборки.
          example: 0
        total:
          type: integer
          description: Общее число элементов.
          example: 42

  parameters:
    LimitParam:
      in: query
      name: limit
      required: false
      description: Максимальное число элементов в выдаче
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

    OffsetParam:
      in: query
      name: offset
      required: false
      description: Смещение от начала выдачи
      schema:
        type: integer
        minimum: 0
        default: 0

    SlotIdParam:
      in: path
      name: slotId
      required: true
      description: Идентификатор слота
      schema:
        type: string
        format: uuid

    BookingIdParam:
      in: path
      name: bookingId
      required: true
      description: Идентификатор бронирования
      schema:
        type: string
        format: uuid

    BookingStatusParam:
      in: query
      name: status
      required: false
      style: form
      explode: true
      description: >-
        Фильтр броней по статусу (множественный выбор, OR внутри группы).
        Без параметра возвращаются брони всех статусов, включая cancelled,
        late_cancel и studio_cancelled — история не скрывается (FR-14, FR-18).
      schema:
        type: array
        items:
          type: string
          enum:
            - active
            - cancelled
            - late_cancel
            - studio_cancelled

    DateFromParam:
      in: query
      name: date_from
      required: false
      description: >-
        Фильтр: слоты со стартом не раньше указанного момента (граница
        включительна). По умолчанию — текущий момент (FR-3, R-027).
      schema:
        type: string
        format: date-time

    DateToParam:
      in: query
      name: date_to
      required: false
      description: >-
        Фильтр: слоты со стартом не позже указанного момента (граница
        включительна). По умолчанию — date_from + 7 дней (FR-3, R-027).
      schema:
        type: string
        format: date-time

    ProgramTypeParam:
      in: query
      name: program_type
      required: false
      style: form
      explode: true
      description: >-
        Тип программы/меню (множественный выбор): novice — новичковый,
        experienced — опытный. Значения внутри группы объединяются по OR;
        между разными группами фильтров (program_type, chef_id) — AND (FR-4).
      schema:
        type: array
        items:
          type: string
          enum:
            - novice
            - experienced

    ChefIdParam:
      in: query
      name: chef_id
      required: false
      style: form
      explode: true
      description: >-
        Идентификаторы шефов (множественный выбор). Значения внутри группы
        объединяются по OR; между разными группами фильтров — AND (FR-4).
      schema:
        type: array
        items:
          type: string
          format: uuid

    OnlyAvailableParam:
      in: query
      name: only_available
      required: false
      description: Только слоты со свободными местами (free_seats > 0). По умолчанию false — показываются все, в т.ч. с пометкой «Мест нет» (FR-4).
      schema:
        type: boolean
        default: false

  responses:
    BadRequest:
      description: Неверные параметры запроса (например, seats_count вне диапазона 1..6 или rental_count больше seats_count).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: bad_request
            message: Неверные параметры запроса. Проверьте корректность переданных значений.

    Unauthorized:
      description: Отсутствует или неверен токен авторизации.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: unauthorized
            message: Требуется авторизация. Передайте действительный токен в заголовке Authorization.

    Forbidden:
      description: Попытка доступа к чужим данным (NFR-8).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: forbidden
            message: Доступ запрещён. Вы не можете обращаться к данным другого клиента.

    NotFound:
      description: Запрашиваемый ресурс не найден.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: not_found
            message: Запрашиваемый ресурс не найден.

    Conflict:
      description: >-
        Нарушение инварианта — нет свободных мест (slot_full, E1/E3), не хватает
        прокатных комплектов на стол (rental_unavailable, E2), двойная бронь
        (double_booking), повторная отмена (already_cancelled) либо повтор
        Idempotency-Key с другим телом запроса (idempotency_key_conflict).
        Гарантия «0 двойных броней» обеспечивается атомарно на бэкенде (NFR-4, R-004).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: slot_full
            message: На выбранном классе не осталось свободных мест.
            details:
              available_seats: 0
              available_rental_sets: 1

    Gone:
      description: Слот отменён студией (status=cancelled); повторная запись запрещена (R-008, FR-18).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: slot_cancelled
            message: Класс отменён студией и более недоступен для записи.

    UnprocessableEntity:
      description: Операция невозможна по бизнес-правилу — например, слот уже стартовал (UC-3 E1).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: slot_started
            message: Класс уже начался, операция недоступна.

    TooManyRequests:
      description: >-
        Слишком частые запросы — превышен лимит отправки SMS-кодов (защита от перебора и от
        расходов на SMS). Повторить можно не раньше resend_after_seconds (см. ответ запроса кода).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: too_many_requests
            message: Слишком много запросов. Повторите попытку позже.

    InternalError:
      description: Внутренняя ошибка сервиса.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: internal_error
            message: Что-то пошло не так. Попробуйте ещё раз позже.
