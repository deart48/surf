openapi: 3.0.3

info:
  title: Шеф-стол API — Slots
  description: >-
    Просмотр слотов расписания кулинарных классов (read-only проекция) с
    фильтрами и пагинацией. Часть клиентского API кулинарной студии «Шеф-стол».
  version: 1.0.0

servers:
  - url: https://api.chef-table.example/v1
    description: Production — продакшен-окружение
  - url: https://staging-api.chef-table.example/v1
    description: Staging — тестовое окружение

tags:
  - name: Slots
    description: Слоты/расписание классов, read-only

security:
  - bearerAuth: []

paths:
  /slots:
    get:
      tags:
        - Slots
      summary: Список классов с фильтрами
      operationId: listSlots
      description: >-
        Возвращает предстоящие слоты (кулинарные классы) с фильтрами и
        пагинацией (SCR-03, FR-3/FR-4, UC-1). Слоты — read-only проекция
        существующей инфраструктуры (NFR-10). По умолчанию only_available=false
        (показываются все, в т.ч. без мест — с пометкой «Мест нет» на клиенте).
        Сортировка по start_at по возрастанию (UC-1).


        Дефолтный диапазон выдачи (FR-3, R-027): если date_from не задан —
        текущий момент; если date_to не задан — date_from + 7 дней. Границы дат
        включительные. Отменённые студией слоты (status=cancelled) попадают в
        выдачу с соответствующим статусом; запись на них недоступна (410, R-008).
        Если предстоящих слотов нет — items пуст (empty state «Пока нет доступных
        классов», UC-1 E2).
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/DateFromParam'
        - $ref: '../common/models.yaml#/components/parameters/DateToParam'
        - $ref: '../common/models.yaml#/components/parameters/ProgramTypeParam'
        - $ref: '../common/models.yaml#/components/parameters/ChefIdParam'
        - $ref: '../common/models.yaml#/components/parameters/OnlyAvailableParam'
        - $ref: '../common/models.yaml#/components/parameters/LimitParam'
        - $ref: '../common/models.yaml#/components/parameters/OffsetParam'
      responses:
        '200':
          description: Список слотов
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/SlotListResponse'
        '400':
          $ref: '../common/models.yaml#/components/responses/BadRequest'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

  /slots/{slotId}:
    get:
      tags:
        - Slots
      summary: Карточка класса
      operationId: getSlot
      description: >-
        Полные данные слота для карточки класса (SCR-05, FR-5): программа/меню и
        её тип, шеф, дата/время старта (~3 ч), адрес студии, цены, доступность
        мест и прокатных комплектов экипировки.
      parameters:
        - $ref: '../common/models.yaml#/components/parameters/SlotIdParam'
      responses:
        '200':
          description: Данные слота
          content:
            application/json:
              schema:
                $ref: './models.yaml#/components/schemas/Slot'
        '401':
          $ref: '../common/models.yaml#/components/responses/Unauthorized'
        '404':
          $ref: '../common/models.yaml#/components/responses/NotFound'
        default:
          $ref: '../common/models.yaml#/components/responses/InternalError'

components:
  securitySchemes:
    bearerAuth:
      $ref: '../auth/models.yaml#/components/securitySchemes/bearerAuth'
